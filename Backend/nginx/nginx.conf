server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # Root for backend PHP files (used by /api, /sanctum, and PHP locations)
    root /var/www/html/public;

    # ── Backend API routes ──────────────────────────────────
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Sanctum / CSRF cookie endpoint ──────────────────────
    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Backend storage (uploaded images, QR codes, etc.) ───
    location /storage {
        alias /var/www/html/storage/app/public;
        try_files $uri $uri/ =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── PHP processing (backend) ────────────────────────────
    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ── Everything else → Frontend (Vue SPA) ────────────────
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── NEW: Reverb WebSocket ──────────────────────
    location /app {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}
