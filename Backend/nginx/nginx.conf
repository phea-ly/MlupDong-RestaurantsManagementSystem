server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # Root for backend PHP files (used by /api, /sanctum, and PHP locations)
    root /var/www/html/public;

    # ── Backend API routes ──────────────────────────────────
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Sanctum / CSRF cookie endpoint ──────────────────────
    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Auth routes (explicitly handle POST for login/user without /api prefix) ──
    location /login {
        if ($request_method = POST) {
            rewrite ^/(.*)$ /index.php?$query_string last;
        }
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /user {
        if ($request_method = POST) {
            rewrite ^/(.*)$ /index.php?$query_string last;
        }
        if ($request_method = PUT) {
            rewrite ^/(.*)$ /index.php?$query_string last;
        }
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Backend storage (uploaded images, QR codes, etc.) ───
    location /storage {
        alias /var/www/html/storage/app/public;
        try_files $uri $uri/ =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── PHP processing (backend) ────────────────────────────
    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ── Everything else → Frontend (Vue SPA) ────────────────
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
