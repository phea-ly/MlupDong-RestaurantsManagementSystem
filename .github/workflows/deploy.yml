# .github/workflows/deploy.yml
name: Build & Deploy


on:
  push:
    branches: [staging]


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Run PHP Tests
        run: |
          cd backend
          composer install
          php artisan test


  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4


      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/image_name:latest
            ${{ secrets.DOCKER_USERNAME }}/image_name:${{ github.sha }}


      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/image_name:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4


      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}

          script: |
            cd /home/ubuntu/mlup_dong
            git pull origin main
            docker login -u ${{ secrets.DOCKER_USERNAME }} \
              -p ${{ secrets.DOCKER_PASSWORD }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker exec container_backend php artisan migrate --force
            docker exec container_backend php artisan cache:clear
            docker exec container_backend php artisan config:cache
            echo "✅ Deployment complete!"

