# .github/workflows/deploy.yml
name: Build & Deploy

on:
  push:
    branches: [staging]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mlupdong_backend:latest
            ${{ secrets.DOCKER_USERNAME }}/mlupdong_backend:${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.PROD_API_URL }}
            VITE_API_BASE_URL=${{ secrets.PROD_API_URL }}
            VITE_REVERB_APP_KEY=${{ secrets.VITE_REVERB_APP_KEY }}
            VITE_REVERB_HOST=${{ secrets.VITE_REVERB_HOST }}
            VITE_REVERB_PORT=${{ secrets.VITE_REVERB_PORT }}
            VITE_REVERB_SCHEME=${{ secrets.VITE_REVERB_SCHEME }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mlupdong_frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/mlupdong_frontend:${{ github.sha }}


      - name: Build & Push Webserver
        uses: docker/build-push-action@v5
        with:
          context: ./Backend/nginx
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mlupdong_webserver:latest
            ${{ secrets.DOCKER_USERNAME }}/mlupdong_webserver:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd /home/ubuntu/mlup_dong
            docker compose pull
            docker compose up -d --remove-orphans
            docker exec mlupdong_backend php artisan cache:clear
            docker exec mlupdong_backend php artisan config:cache
            echo "✅ Deployment complete!"
