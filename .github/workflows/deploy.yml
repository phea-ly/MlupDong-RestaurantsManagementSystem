  # .github/workflows/deploy.yml
  name: Build & Deploy

  on:
    push:
      branches: [staging]

  jobs:
    build-and-push:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Build & Push Backend
          uses: docker/build-push-action@v5
          with:
            context: ./Backend
            push: true
            tags: |
              ${{ secrets.DOCKER_USERNAME }}/mlupdong_backend:latest
              ${{ secrets.DOCKER_USERNAME }}/mlupdong_backend:${{ github.sha }}

        - name: Build & Push Frontend
          uses: docker/build-push-action@v5
          with:
            context: ./Frontend
            push: true
            build-args: |
              VITE_API_URL=${{ secrets.PROD_API_URL }}
            tags: |
              ${{ secrets.DOCKER_USERNAME }}/mlupdong_frontend:latest
              ${{ secrets.DOCKER_USERNAME }}/mlupdong_frontend:${{ github.sha }}

        - name: Build & Push Webserver
          uses: docker/build-push-action@v5
          with:
            context: ./Backend/nginx
            push: true
            tags: |
              ${{ secrets.DOCKER_USERNAME }}/mlupdong_webserver:latest
              ${{ secrets.DOCKER_USERNAME }}/mlupdong_webserver:${{ github.sha }}

    deploy:
      needs: build-and-push
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Copy files to Server
          uses: appleboy/scp-action@v0.1.7
          with:
            host: ${{ secrets.AWS_HOST }}
            username: ${{ secrets.AWS_USER }}
            key: ${{ secrets.AWS_SSH_KEY }}
            source: "docker-compose.yml,backend/.env"  # ✅ include .env too
            target: "/home/ubuntu/mlup_dong"
            timeout: 30s
            command_timeout: 5m

        - name: Deploy to EC2
          uses: appleboy/ssh-action@v1
          with:
            host: ${{ secrets.AWS_HOST }}
            username: ${{ secrets.AWS_USER }}
            key: ${{ secrets.AWS_SSH_KEY }}
            command_timeout: 30m                        # ✅ was missing, caused timeouts
            script: |
              cd /home/ubuntu/mlup_dong

              # ✅ use --password-stdin (secure, avoids CLI warning)
              echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
                -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

              docker compose pull
              docker compose up -d --remove-orphans

              # ✅ wait for backend to be healthy before running artisan
              echo "Waiting for backend to be ready..."
              sleep 15

              docker exec mlupdong_backend php artisan migrate --force
              docker exec mlupdong_backend php artisan cache:clear
              docker exec mlupdong_backend php artisan config:cache
              docker image prune -f                     # ✅ clean up old images
              echo "✅ Deployment complete!"