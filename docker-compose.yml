# docker-compose.yml
services:
  backend:
    image: mesasmos/mlupdong_backend:latest
    container_name: mlupdong_backend
    restart: always
    networks: [web]
    env_file: ./backend/.env
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 30s
      retries: 3
      start_period: 30s

  frontend:
    image: mesasmos/mlupdong_frontend:latest
    container_name: mlupdong_frontend
    restart: always
    networks: [web]

  webserver:
    image: mesasmos/mlupdong_webserver:latest
    container_name: mlupdong_webserver
    restart: unless-stopped
    ports: ["82:80", "443:443"]
    volumes:
      - backend_storage:/var/www/html/storage        # ← REMOVED ./backend/public mount
      - ./certbot/conf:/etc/letsencrypt
    networks: [web]
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy                   # ← now uses healthcheck

  db:
    image: mysql
    container_name: mlupdong_container_db
    restart: always
    environment:
      MYSQL_DATABASE: mlupdong_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    networks: [web]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: mlupdong_container_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes: [redis_data:/data]
    networks: [web]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3
      start_period: 10s

networks:
  web:
    driver: bridge

volumes:
  backend_storage:
  backend_cache:
  mysql_data:
  redis_data: